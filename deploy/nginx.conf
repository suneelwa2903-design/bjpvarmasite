# VarmaSite Nginx Configuration
# Copy to /etc/nginx/sites-available/varmasite

upstream varmasite {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name bjpvarma.co.in www.bjpvarma.co.in;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bjpvarma.co.in www.bjpvarma.co.in;

    # SSL (certbot will fill these in)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security headers (additional to Next.js middleware)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static files caching
    location /_next/static/ {
        proxy_pass http://varmasite;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://varmasite;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://varmasite;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }

    client_max_body_size 10M;
}
